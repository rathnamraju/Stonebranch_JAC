content: |-
  @Echo off
  SET AWS_ACCESS_KEY_ID=${AWS_BUCKET_ACCESS_KEY}
  SET AWS_SECRET_ACCESS_KEY=${AWS_BUCKET_SECRET_KEY}
  SET AWS_DEFAULT_REGION=${AWS_BUCKET_REGION}
  aws s3 mv s3://${AWS_BUCKET_NAME}${AWS_Bucket_Directory} ${Server_Root}${Temp_Folder_Location}  --recursive --exclude "*" --include "*%{File_Pattern}*"  --exclude "*/*"
