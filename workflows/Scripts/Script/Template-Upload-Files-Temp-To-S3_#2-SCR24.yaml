content: |-
  @Echo off
  SET aws_access_key_id=${AWS_SCD_BUCKET_ACCESS_KEY}
  SET aws_secret_access_key=${AWS_SCD_BUCKET_SECRET_KEY}
  SET region=${AWS_SCD_BUCKET_REGION}
  SET output text
  @echo ON

  aws s3 mv ${in_file_location} s3://${AWS_SCD_BUCKET_NAME}${S3_Subfolder} --recursive
